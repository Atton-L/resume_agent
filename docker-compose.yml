services:
  resume-agent:
    build: .
    container_name: resume-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./resumes:/app/resumes
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
    restart: unless-stopped
